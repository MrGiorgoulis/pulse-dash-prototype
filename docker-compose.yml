# PostgreSQL for PULSE DR backend
# Run: docker compose up -d
# Stop: docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse_dr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse_dr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
