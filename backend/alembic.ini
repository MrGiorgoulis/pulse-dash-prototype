# Alembic config for PULSE DR (PostgreSQL)
# Use env.py for dynamic config (e.g. DATABASE_URL from .env)

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use async URL from env in env.py; placeholder for alembic.ini only
sqlalchemy.url = postgresql+asyncpg://pulse:pulse@localhost:5432/pulse_dr

[post_write_hooks]
# hooks = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
